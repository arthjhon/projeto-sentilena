name: Deploy to Production
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/config <<EOF
          Host ssh.teranex.inf.br
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
            IdentityFile ~/.ssh/id_ed25519
          EOF

      - name: Deploy via SSH
        run: |
          ssh teranex-sentinela@ssh.teranex.inf.br "
            export NVM_DIR=\"\$HOME/.nvm\"
            [ -s \"\$NVM_DIR/nvm.sh\" ] && \. \"\$NVM_DIR/nvm.sh\"
            export PATH=\$PATH:/usr/bin:/usr/local/bin
            cd /home/teranex-sentinela/repo
            git config --global --add safe.directory /home/teranex-sentinela/repo
            git fetch origin
            git checkout main
            git pull origin main
            npm install
            npm run build
            cp -r dist/* /home/teranex-sentinela/htdocs/sentinela.teranex.inf.br/
          "
